<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="hero contact-hero">
			<video autoplay muted loop id="bg-video">
                <source src="videos/contact.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="hero-content">
                <h1>Contact</h1>
                <p>Get in touch with me.</p>
            </div>
        </section>

        <div class="container">
            <section class="contact-section">
                <div class="contact-wrapper">
                    <div class="contact-info">
                        <h3>Let's Connect</h3>
                        <p>I'm currently looking for new opportunities and my inbox is always open. Whether you have a question or just want to say hi, I'll get back to you!</p>
                        <ul class="contact-list">
                            <li><a href="mailto:lenatheresequizon04@gmail.com"><i class="fas fa-envelope"></i> lenatheresequizon04@gmail.com</a></li>
                            <li><a href="mailto:lenaquizonth19@gmail.com"><i class="fas fa-envelope"></i> lenaquizonth19@gmail.com</a></li>
                        </ul>
                        <ul class="social-links-contact">
                            <li><a href="https://www.facebook.com/lena.quizon" target="_blank"><i class="fab fa-facebook"></i></a></li>
                            <li><a href="https://www.instagram.com/quizonlena/" target="_blank"><i class="fab fa-instagram"></i></a></li>
                            <li><a href="https://www.linkedin.com/in/lena-therese-quizon-829204368/" target="_blank"><i class="fab fa-linkedin"></i></a></li>
                            <li><a href="https://github.com/lenaquizon" target="_blank"><i class="fab fa-github"></i></a></li>
                        </ul>
                    </div>
                    <div class="contact-form">
                        <form action="#">
                            <div class="form-group">
                                <input type="text" name="name" placeholder="Your Name" required>
                            </div>
                            <div class="form-group">
                                <input type="email" name="email" placeholder="Your Email" required>
                            </div>
                            <div class="form-group">
                                <input type="text" name="subject" placeholder="Subject" required>
                            </div>
                            <div class="form-group">
                                <textarea name="message" placeholder="Your Message" required></textarea>
                            </div>
                            <button type="submit" class="cta-button">Send Message</button>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
</body>
</html>
